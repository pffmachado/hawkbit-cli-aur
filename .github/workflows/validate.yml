name: Validate AUR package

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install base tooling
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git \
            python python-build python-installer python-setuptools python-wheel \
            python-httpx python-rich python-typer
      - uses: actions/checkout@v4
      - name: Prepare build user
        run: |
          useradd -m builder
          chown -R builder:builder "${GITHUB_WORKSPACE}"
      - name: Build package
        run: |
          su builder -c "cd '${GITHUB_WORKSPACE}' && makepkg --nodeps --cleanbuild --noprogressbar"
