name: Publish to AUR

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      AUR_PKGNAME: hawkbit-cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Trust AUR host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Push package to AUR
        run: |
          git config user.name "Paulo Machado"
          git config user.email "pffmachado@gmail.com"
          git clone "ssh://aur@aur.archlinux.org/${AUR_PKGNAME}.git" aur-repo
          cp PKGBUILD .SRCINFO aur-repo/
          cd aur-repo
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "Update ${AUR_PKGNAME} package from GitHub Actions"
          git push origin master
