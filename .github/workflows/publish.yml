name: Publish to AUR

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Trust AUR host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Push package to AUR
        run: |
          git config user.name "Paulo Machado"
          git config user.email "pffmachado@gmail.com"
          git remote add aur ssh://aur@aur.archlinux.org/hawkbit-cli.git
          git push aur HEAD:master
